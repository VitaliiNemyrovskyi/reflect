# In-container nginx — serves the Angular bundle and falls back to
# index.html for client-side routes. /api is NOT proxied here (the outer
# bober-web ingress already routes /api/* to reflect_api before it ever
# reaches this container) — keeping it single-responsibility.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed assets. outputHashing=all means filenames change
    # on every meaningful edit, so 1-year immutable is safe.
    location ~* \.(js|css|woff2?|ttf|eot|otf|png|jpe?g|gif|svg|ico|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # PWA manifest + service-worker friendly: don't cache the entry HTML.
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # SPA fallback — every unknown path returns index.html so Angular
    # routing can handle it on the client.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Compression (we already have brotli on the outer Cloudflare layer
    # but gzip here is cheap and helps if Cloudflare proxy is bypassed).
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml application/manifest+json;
}
