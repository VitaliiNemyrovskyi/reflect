# Reflect — production stack on the shared Contabo VPS.
#
# Pattern mirrors swift-mail/docker-compose.prod.yml: the API + web run on
# the external `proxy` docker network, no external port mappings. The host's
# bober-web nginx ingress (which owns :80) proxies Host: reflect.swift-mail.app
# to these containers via Docker DNS — see deploy/nginx-reflect.conf and
# deploy/reconcile-reflect-ingress.sh.
#
# SQLite lives on a docker volume (`reflect_data`) so deploys don't nuke it.

services:
  api:
    image: reflect/api:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: reflect_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: 3000
      # SQLite db file lives on the named volume below.
      DATABASE_URL: file:/data/reflect.db
      PROMPTS_DIR: /app/prompts
      # LLM provider — Anthropic OR openrouter. See backend/src/llm/llm.service.ts.
      LLM_PROVIDER: ${LLM_PROVIDER:-openrouter}
      LLM_MODEL_CHAT: ${LLM_MODEL_CHAT:-}
      LLM_MODEL_FEEDBACK: ${LLM_MODEL_FEEDBACK:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      # Auth — JWT secrets MUST be set; OAuth is optional.
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      # OAuth callback URLs are derived from API_BASE_URL, FRONTEND_URL is
      # where the auth.controller redirects after OAuth completes.
      API_BASE_URL: https://reflect.swift-mail.app
      FRONTEND_URL: https://reflect.swift-mail.app
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
    volumes:
      - reflect_data:/data
    healthcheck:
      # NestJS doesn't expose a dedicated health route — /api just 404s
      # cleanly when the app is up, which is enough to confirm liveness.
      # Use node directly (already in the image) instead of wget/curl so the
      # check doesn't depend on Alpine's BusyBox version.
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    image: reflect/web:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: reflect_web
    restart: unless-stopped
    depends_on:
      - api
    # No external port mapping — bober-web nginx routes Host: reflect.swift-mail.app
    # to this container's :80 over the shared `proxy` network.

volumes:
  reflect_data:

# External shared network — bober-web nginx attaches itself here so it can
# resolve `reflect_api` / `reflect_web` by container name. The network is
# created lazily by deploy/reconcile-reflect-ingress.sh if it doesn't exist.
networks:
  default:
    name: proxy
    external: true
