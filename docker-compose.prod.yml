# Reflect — production stack on the shared Contabo VPS.
#
# Architecture: Reflect is FULLY INDEPENDENT of bober/swiftmail.
#  - Caddy ingress binds host :443 directly, gets its own Let's Encrypt
#    cert via DNS-01 challenge (Cloudflare API). No reliance on bober's
#    nginx, no docker cp injection that breaks on container recreate.
#  - reflect.swift-mail.app is configured DNS-only in Cloudflare (gray
#    cloud); browsers hit our Caddy directly with a valid TLS cert.
#  - Internal `proxy` network is private to Reflect — not the shared
#    `proxy` net used by bober/swiftmail. Cross-project isolation.
#
# SQLite lives on a docker volume (`reflect_data`) so deploys don't
# nuke patient data.

services:
  api:
    image: reflect/api:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: reflect_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: 3000
      DATABASE_URL: file:/data/reflect.db
      PROMPTS_DIR: /app/prompts
      LLM_PROVIDER: ${LLM_PROVIDER:-openrouter}
      LLM_MODEL_CHAT: ${LLM_MODEL_CHAT:-}
      LLM_MODEL_FEEDBACK: ${LLM_MODEL_FEEDBACK:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      API_BASE_URL: https://reflect.swift-mail.app
      FRONTEND_URL: https://reflect.swift-mail.app
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
    volumes:
      - reflect_data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    image: reflect/web:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: reflect_web
    restart: unless-stopped
    depends_on:
      - api

  caddy:
    image: reflect/caddy:${IMAGE_TAG:-latest}
    build:
      context: ./deploy/caddy
    container_name: reflect_caddy
    restart: unless-stopped
    ports:
      - "443:443"
      - "443:443/udp" # HTTP/3 (QUIC)
    environment:
      # Caddy needs this for the DNS-01 challenge against Cloudflare.
      # See deploy/Caddyfile for usage.
      CADDY_CF_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web

volumes:
  reflect_data:
  caddy_data:    # Caddy's auto-issued cert + ACME state lives here.
  caddy_config:

# Private network — only reflect's containers. NOT the shared `proxy`
# network used by bober/swiftmail. Caddy resolves `reflect_api` and
# `reflect_web` by container name on this internal net.
networks:
  default:
    name: reflect_net
    driver: bridge
