# Mounted into bober-web nginx at /etc/nginx/conf.d/reflect.conf
# Routes reflect.swift-mail.app traffic to the reflect_web / reflect_api
# containers on the shared `proxy` docker network.
#
# Cloudflare in front terminates TLS (Flexible/Full SSL); we only listen
# on :80 here. Mirrors the pattern in nginx-swiftmail.conf.

server {
  listen 80;
  server_name reflect.swift-mail.app;

  # Patient profiles + transcripts can be a few MB on long sessions.
  client_max_body_size 16m;

  # Backend API + auth + SSE-streaming feedback. The streaming endpoint
  # (/api/sessions/:id/end-stream) needs:
  #   - proxy_buffering off → tokens reach the client immediately
  #   - long read timeout   → supervisor LLM can take 60-120s to finish
  #   - http/1.1 + chunked  → SSE relies on chunked transfer encoding
  location /api/ {
    proxy_pass http://reflect_api:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # Disable buffering for SSE streaming feedback.
    proxy_buffering off;
    proxy_cache off;

    # Generous timeouts to cover supervisor LLM streams.
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }

  # Static SPA — Angular build served from the reflect_web container.
  location / {
    proxy_pass http://reflect_web:80;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 60s;
  }
}
